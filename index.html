<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stream Player</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; overflow:hidden; }
  #v { width:100%; height:100vh; background:#000; display:block; }
  video::cue { background: rgba(0,0,0,0.8); color: #fff; font-size: 0.8em; }
</style>
</head>
<body>
  <video id="v" controls autoplay playsinline crossorigin="anonymous"></video>

<script>
const LANG_MAP = { 'id':'Indonesia','in':'Indonesia','en':'English','ms':'Melayu','ko':'Korean','ja':'Japanese' };
const p = new URLSearchParams(location.search);
const id = p.get('id'), s = p.get('s'), e = p.get('e'), subLang = p.get('ds_lang') || 'id';

if (id) {
  fetch(`/api?id=${id}${s ? '&s='+s+'&e='+(e||'1') : ''}`).then(r => r.json()).then(data => {
    const v = document.getElementById('v');
    
    // Pasang Subtitle ke Player
    if (data.subtitle && Array.isArray(data.subtitle)) {
      data.subtitle.forEach(sub => {
        if (sub.url && sub.lang) {
          const track = document.createElement('track');
          track.kind = 'subtitles';
          track.label = LANG_MAP[sub.lang.toLowerCase()] || sub.label || sub.lang.toUpperCase();
          track.srclang = sub.lang.toLowerCase();
          // Gunakan Proxy agar List Bahasa Tidak Hilang/Error CORS
          track.src = '/api?url=' + encodeURIComponent(sub.url);
          if (track.srclang === subLang) track.default = true;
          v.appendChild(track);
        }
      });
    }

    // Putar Video
    const streamUrl = '/api?url=' + encodeURIComponent(data.url);
    if (Hls.isSupported()) {
      const hls = new Hls();
      hls.loadSource(streamUrl);
      hls.attachMedia(v);
      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        v.play().catch(() => {});
        // Trik agar daftar list bahasa muncul di menu CC/Teks
        setTimeout(() => {
          for (let i = 0; i < v.textTracks.length; i++) {
            v.textTracks[i].mode = (v.textTracks[i].language === subLang) ? 'showing' : 'hidden';
          }
        }, 1500);
      });
    } else {
      v.src = streamUrl;
    }
  });
}
</script>
</body>
</html>
