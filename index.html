<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stream Player</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #000; font-family: system-ui, sans-serif; color: #fff; overflow: hidden; }
#loader { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; z-index: 100; }
.spinner { width: 45px; height: 45px; border: 4px solid rgba(255,255,255,.1); border-top-color: #f5c518; border-radius: 50%; animation: spin .9s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#player { position: fixed; inset: 0; display: none; background: #000; }
video { width: 100%; height: 100%; display: block; }
video::cue { background: rgba(0,0,0,0.8); color: #fff; font-size: 0.9em; }
</style>
</head>
<body>

<div id="loader">
  <div class="spinner"></div>
  <div style="margin-top: 15px; font-size: 13px; color: #94a3b8;">Sinkronisasi Subtitle...</div>
</div>

<div id="player">
  <video id="v" controls autoplay playsinline crossorigin="anonymous"></video>
</div>

<script>
const langNames = { 'id':'Indonesia', 'en':'English', 'ms':'Melayu', 'zh':'Chinese', 'ja':'Japanese', 'ko':'Korean' };
const p = new URLSearchParams(location.search);
const id = p.get('id'), s = p.get('s'), e = p.get('e'), subLang = p.get('ds_lang') || 'id';

if (id) {
  const apiUrl = `/api?id=${id}${s ? '&s='+s+'&e='+(e||'1') : ''}&ds_lang=${subLang}`;
  fetch(apiUrl).then(r => r.json()).then(data => {
    if (data.error) throw new Error(data.error);
    play(data.url, data.subtitle); 
  }).catch(err => {
    document.getElementById('loader').style.display = 'none';
    alert("Error: " + err.message);
  });
}

function play(videoUrl, subtitleData) {
  const v = document.getElementById('v');
  const streamUrl = '/api?url=' + encodeURIComponent(videoUrl);

  // 1. Tambahkan Track Subtitle secara Manual
  if (subtitleData && Array.isArray(subtitleData)) {
    subtitleData.forEach((sub) => {
      if (sub && sub.url) {
        const track = document.createElement('track');
        track.kind = 'captions';
        
        let label = sub.label;
        if (!label || label.toLowerCase().includes('unknown')) {
            label = langNames[sub.lang] || sub.lang.toUpperCase() || 'Subtitle';
        }
        
        track.label = label;
        track.srclang = sub.lang;
        track.src = sub.url; 
        
        // Tandai sebagai default jika sesuai pilihan Firebase
        if (sub.lang === subLang) {
          track.default = true;
        }
        v.appendChild(track);
      }
    });
  }

  // 2. Load Video
  if (Hls.isSupported()) {
    const hls = new Hls({ enableWorker: true });
    hls.loadSource(streamUrl);
    hls.attachMedia(v);
    
    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('player').style.display = 'block';
      v.play().catch(() => {});
    });

    // Jalankan paksa pemilihan track setelah metadata siap
    v.onloadedmetadata = () => {
      for (let i = 0; i < v.textTracks.length; i++) {
        if (v.textTracks[i].language === subLang) {
          v.textTracks[i].mode = 'showing';
        } else {
          v.textTracks[i].mode = 'disabled'; // Sembunyikan yang lain tapi tetap ada di list
        }
      }
    };
  } else {
    v.src = streamUrl;
    v.oncanplay = () => {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('player').style.display = 'block';
    };
  }
}
</script>
</body>
</html>
