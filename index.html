<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stream Player</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #000; font-family: system-ui, sans-serif; color: #fff; overflow: hidden; }
#loader { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; z-index: 100; }
.spinner { width: 50px; height: 50px; border: 4px solid rgba(255,255,255,.1); border-top-color: #f5c518; border-radius: 50%; animation: spin .9s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#player { position: fixed; inset: 0; display: none; background: #000; }
video { width: 100%; height: 100%; display: block; background: #000; }
video::cue { background: rgba(0,0,0,.8); color: #fff; font-size: .95em; }
#err { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; background: #000; text-align: center; padding: 20px; }
</style>
</head>
<body>

<div id="loader">
  <div class="spinner"></div>
  <div style="margin-top: 15px; font-size: 14px; color: #94a3b8;">Loading No-Ads Stream...</div>
</div>

<div id="player">
  <video id="v" controls autoplay playsinline crossorigin="anonymous"></video>
</div>

<div id="err">
  <div style="font-size: 18px; font-weight: bold; color: #fff; margin-bottom: 10px;">Gagal Memuat Konten</div>
  <div id="err-detail" style="color: #ef4444; font-size: 13px;"></div>
</div>

<script>
const LANG_NAMES = {
  id:'Indonesia', in:'Indonesia', ind:'Indonesia', indonesian:'Indonesia', bahasa:'Indonesia',
  en:'English', eng:'English', english:'English',
  ms:'Melayu', may:'Melayu', msa:'Melayu', malay:'Melayu',
  zh:'Chinese', chi:'Chinese', zho:'Chinese', cn:'Chinese', chinese:'Chinese', mandarin:'Chinese',
  ja:'Japanese', jpn:'Japanese', jp:'Japanese', japanese:'Japanese',
  ko:'Korean', kor:'Korean', kr:'Korean', korean:'Korean',
  ar:'Arabic', ara:'Arabic', arabic:'Arabic',
  th:'Thai', tha:'Thai', thai:'Thai',
  vi:'Vietnamese', vie:'Vietnamese', vietnamese:'Vietnamese',
  es:'Spanish', spa:'Spanish', spanish:'Spanish',
  fr:'French', fra:'French', fre:'French', french:'French',
  de:'German', deu:'German', ger:'German', german:'German',
  pt:'Portuguese', por:'Portuguese', portuguese:'Portuguese',
  ru:'Russian', rus:'Russian', russian:'Russian',
  hi:'Hindi', hin:'Hindi', hindi:'Hindi',
  tr:'Turkish', tur:'Turkish', turkish:'Turkish',
  tl:'Tagalog', fil:'Filipino', tagalog:'Tagalog', filipino:'Filipino',
  nl:'Dutch', dutch:'Dutch',
  sv:'Swedish', swedish:'Swedish',
  no:'Norwegian', norwegian:'Norwegian',
  da:'Danish', danish:'Danish',
  fi:'Finnish', finnish:'Finnish',
  pl:'Polish', polish:'Polish',
  cs:'Czech', czech:'Czech',
  el:'Greek', greek:'Greek',
  he:'Hebrew', hebrew:'Hebrew',
  uk:'Ukrainian', ukrainian:'Ukrainian',
  ro:'Romanian', romanian:'Romanian',
  hu:'Hungarian', hungarian:'Hungarian',
  bg:'Bulgarian', bulgarian:'Bulgarian',
  bn:'Bengali', bengali:'Bengali',
  ta:'Tamil', tamil:'Tamil',
  te:'Telugu', telugu:'Telugu',
  ur:'Urdu', urdu:'Urdu',
  fa:'Persian', persian:'Persian', farsi:'Persian'
};

const LANG_3TO2 = {
  ind:'id', eng:'en', may:'ms', msa:'ms', chi:'zh', zho:'zh',
  jpn:'ja', kor:'ko', ara:'ar', tha:'th', vie:'vi', spa:'es',
  fra:'fr', fre:'fr', deu:'de', ger:'de', por:'pt', rus:'ru',
  hin:'hi', tur:'tr', fil:'tl', ben:'bn', tam:'ta', tel:'te',
  urd:'ur', fas:'fa', per:'fa'
};

function normalizeLang(raw) {
  if (!raw) return '';
  const v = String(raw).toLowerCase().trim();
  if (!v || v === 'unknown' || v === 'und' || v === 'xx' || v === 'null' || v === 'undefined') return '';
  if (LANG_3TO2[v]) return LANG_3TO2[v];
  if (LANG_NAMES[v]) {
    for (const [code, name] of Object.entries(LANG_NAMES)) {
      if (code.length === 2 && name === LANG_NAMES[v]) return code;
    }
  }
  if (v.length >= 2) return v.slice(0, 2);
  return '';
}

function guessLangFromUrl(url) {
  if (!url) return '';
  try {
    const lower = url.toLowerCase();
    const name = lower.split('?')[0].split('/').pop();
    let m = name.match(/[._-]([a-z]{2,3})\.(?:vtt|srt|ass|ssa)$/i);
    if (m) return normalizeLang(m[1]);
    m = lower.match(/\/([a-z]{2,3})\/[^/]+\.(?:vtt|srt|ass|ssa)/i);
    if (m) return normalizeLang(m[1]);
    for (const key of Object.keys(LANG_NAMES)) {
      if (key.length > 3 && lower.includes(key)) return normalizeLang(key);
    }
  } catch (_) {}
  return '';
}

const p = new URLSearchParams(location.search);
const id = p.get('id'), s = p.get('s'), e = p.get('e');
const subLang = normalizeLang(p.get('ds_lang') || 'id') || 'id';

if (id) {
  const apiUrl = `/api?id=${id}${s ? '&s='+s+'&e='+(e||'1') : ''}&ds_lang=${subLang}`;

  fetch(apiUrl)
    .then(r => r.json())
    .then(data => {
      if (data.error) throw new Error(data.error);
      play(data.url, data.subtitle);
    })
    .catch(err => {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('err').style.display = 'flex';
      document.getElementById('err-detail').textContent = err.message;
    });
}

function play(videoUrl, subtitleData) {
  const v = document.getElementById('v');
  const streamUrl = '/api?url=' + encodeURIComponent(videoUrl);

  if (subtitleData && Array.isArray(subtitleData)) {
    const seen = new Set();
    subtitleData.forEach((sub) => {
      if (!sub || !sub.url || seen.has(sub.url)) return;
      seen.add(sub.url);

      const lang = normalizeLang(sub.lang) || guessLangFromUrl(sub.url) || '';

      // Lewati subtitle yang bahasanya tidak bisa dipastikan
      if (!lang || !LANG_NAMES[lang]) return;

      const label = LANG_NAMES[lang];

      const track = document.createElement('track');
      track.kind = 'subtitles';
      track.label = label;
      track.srclang = lang;
      track.src = sub.url;
      if (lang === subLang) track.default = true;
      v.appendChild(track);
    });
  }

  if (Hls.isSupported()) {
    const hls = new Hls({ enableWorker: true });
    hls.loadSource(streamUrl);
    hls.attachMedia(v);
    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('player').style.display = 'block';
      v.play().catch(() => {});
    });
    v.onloadedmetadata = () => {
      let matched = false;
      for (let i = 0; i < v.textTracks.length; i++) {
        const tt = v.textTracks[i];
        if (normalizeLang(tt.language) === subLang && !matched) {
          tt.mode = 'showing'; matched = true;
        } else {
          tt.mode = 'disabled';
        }
      }
      if (!matched && v.textTracks.length > 0) v.textTracks[0].mode = 'showing';
    };
  } else {
    v.src = streamUrl;
    v.oncanplay = () => {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('player').style.display = 'block';
    };
  }
}
</script>
</body>
</html>
