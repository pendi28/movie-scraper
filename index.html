<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stream Player</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #000; font-family: system-ui, sans-serif; color: #fff; overflow: hidden; }
#loader { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; z-index: 100; }
.spinner { width: 50px; height: 50px; border: 4px solid rgba(255,255,255,.1); border-top-color: #f5c518; border-radius: 50%; animation: spin .9s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#player { position: fixed; inset: 0; display: none; background: #000; }
video { width: 100%; height: 100%; display: block; }
#err { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; background: #000; text-align: center; padding: 20px; }
</style>
</head>
<body>

<div id="loader">
  <div class="spinner"></div>
  <div style="margin-top: 15px; font-size: 14px; color: #94a3b8;">Menyiapkan Player...</div>
</div>

<div id="player">
  <video id="v" controls autoplay playsinline crossorigin="anonymous"></video>
</div>

<div id="err">
  <div style="font-size: 18px; font-weight: bold; color: #fff; margin-bottom: 10px;">Gagal Memuat Konten</div>
  <div id="err-detail" style="color: #ef4444; font-size: 13px;"></div>
</div>

<script>
// Kamus untuk menerjemahkan kode bahasa yang sering "Unknown"
const langNames = {
  'id': 'Indonesia',
  'en': 'English',
  'ms': 'Melayu',
  'zh': 'Chinese',
  'ja': 'Japanese',
  'ko': 'Korean',
  'th': 'Thai',
  'vi': 'Vietnamese'
};

const p = new URLSearchParams(location.search);
const id = p.get('id'), s = p.get('s'), e = p.get('e');
const subLang = p.get('ds_lang') || 'id';

if (id) {
  const apiUrl = `/api?id=${id}${s ? '&s='+s+'&e='+(e||'1') : ''}&ds_lang=${subLang}`;
  
  fetch(apiUrl)
    .then(r => r.json())
    .then(data => {
      if (data.error) throw new Error(data.error);
      play(data.url, data.subtitle); 
    })
    .catch(err => {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('err').style.display = 'flex';
      document.getElementById('err-detail').textContent = err.message;
    });
}

function play(videoUrl, subtitleData) {
  const v = document.getElementById('v');
  const streamUrl = '/api?url=' + encodeURIComponent(videoUrl);

  if (subtitleData && Array.isArray(subtitleData)) {
    subtitleData.forEach((sub) => {
      if (sub && sub.url) {
        const track = document.createElement('track');
        track.kind = 'captions';
        
        // --- PERBAIKAN LABEL DISINI ---
        // Jika label dari server kosong atau "unknown", cek ke kamus langNames kita
        let finalLabel = sub.label;
        if (!finalLabel || finalLabel.toLowerCase().includes('unknown')) {
            finalLabel = langNames[sub.lang] || sub.lang || 'Subtitle';
        }
        
        track.label = finalLabel;
        track.srclang = sub.lang || 'id';
        track.src = sub.url;
        
        // Auto-ON jika bahasa sesuai pilihan Firebase atau mengandung kata "Indonesia"
        if (sub.lang === subLang || finalLabel.toLowerCase().includes('indonesia')) {
          track.default = true;
        }
        v.appendChild(track);
      }
    });
  }

  if (Hls.isSupported()) {
    const hls = new Hls({ enableWorker: true });
    hls.loadSource(streamUrl);
    hls.attachMedia(v);
    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('player').style.display = 'block';
      v.play().catch(() => {});
    });
  } else {
    v.src = streamUrl;
    v.oncanplay = () => {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('player').style.display = 'block';
    };
  }
}
</script>
</body>
</html>
