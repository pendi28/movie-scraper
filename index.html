<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stream Player</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
<script src="https://pl29150268.profitablecpmratenetwork.com/0f/0a/59/0f0a59f28aa4a052d5081332c2884efa.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #000; font-family: system-ui, sans-serif; color: #fff; overflow: hidden; }
#loader { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; z-index: 100; }
.spinner { width: 50px; height: 50px; border: 4px solid rgba(255,255,255,.1); border-top-color: #f5c518; border-radius: 50%; animation: spin .9s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#player { position: fixed; inset: 0; display: none; background: #000; }
video { width: 100%; height: 100%; display: block; }
#err { position: fixed; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; background: #000; text-align: center; padding: 20px; }
</style>
</head>
<body>

<div id="loader">
  <div class="spinner"></div>
  <div style="margin-top: 15px; font-size: 14px; color: #94a3b8;">Loading No-Ads Stream...</div>
</div>

<div id="player">
  <video id="v" controls autoplay playsinline crossorigin="anonymous"></video>
</div>

<div id="err">
  <div style="font-size: 18px; font-weight: bold; color: #fff; margin-bottom: 10px;">Gagal Memuat Konten</div>
  <div id="err-detail" style="color: #ef4444; font-size: 13px;"></div>
</div>

<script>
const LANG_NAMES = {
  id:'Indonesia', in:'Indonesia', ind:'Indonesia',
  en:'English', eng:'English',
  ms:'Melayu', may:'Melayu', msa:'Melayu',
  zh:'Chinese', chi:'Chinese', zho:'Chinese', cn:'Chinese',
  ja:'Japanese', jpn:'Japanese', jp:'Japanese',
  ko:'Korean', kor:'Korean', kr:'Korean',
  ar:'Arabic', ara:'Arabic',
  th:'Thai', tha:'Thai',
  vi:'Vietnamese', vie:'Vietnamese',
  es:'Spanish', spa:'Spanish',
  fr:'French', fra:'French', fre:'French',
  de:'German', deu:'German', ger:'German',
  pt:'Portuguese', por:'Portuguese',
  ru:'Russian', rus:'Russian',
  hi:'Hindi', hin:'Hindi',
  tr:'Turkish', tur:'Turkish',
  tl:'Tagalog', fil:'Filipino',
  nl:'Dutch', sv:'Swedish', no:'Norwegian', da:'Danish', fi:'Finnish',
  pl:'Polish', cs:'Czech', el:'Greek', he:'Hebrew', uk:'Ukrainian',
  ro:'Romanian', hu:'Hungarian', bg:'Bulgarian'
};
const LANG_3TO2 = {
  ind:'id', eng:'en', may:'ms', msa:'ms', chi:'zh', zho:'zh',
  jpn:'ja', kor:'ko', ara:'ar', tha:'th', vie:'vi', spa:'es',
  fra:'fr', fre:'fr', deu:'de', ger:'de', por:'pt', rus:'ru',
  hin:'hi', tur:'tr', fil:'tl'
};

function normalizeLang(raw) {
  if (!raw) return '';
  const v = String(raw).toLowerCase().trim();
  if (!v || v === 'unknown' || v === 'und' || v === 'xx' || v === 'null') return '';
  if (LANG_3TO2[v]) return LANG_3TO2[v];
  return v.slice(0, 2);
}
function guessLangFromUrl(url) {
  if (!url) return '';
  try {
    const lower = url.toLowerCase();
    const name = lower.split('?')[0].split('/').pop();
    let m = name.match(/[._-]([a-z]{2,3})\.(?:vtt|srt|ass|ssa)$/i);
    if (m) return normalizeLang(m[1]);
    m = lower.match(/\/([a-z]{2,3})\/[^/]+\.(?:vtt|srt|ass|ssa)/i);
    if (m) return normalizeLang(m[1]);
  } catch (_) {}
  return '';
}
function buildLabel(rawLabel, lang) {
  if (rawLabel && !/unknown/i.test(rawLabel) && String(rawLabel).trim()) return String(rawLabel).trim();
  if (lang && LANG_NAMES[lang]) return LANG_NAMES[lang];
  if (lang) return lang.toUpperCase();
  return 'Subtitle';
}

const p = new URLSearchParams(location.search);
const id = p.get('id'), s = p.get('s'), e = p.get('e');
const subLang = normalizeLang(p.get('ds_lang') || 'id') || 'id';
const subId = "0f0a59f28aa4a052d5081332c2884efa";

if (id) {
  const apiUrl = `/api?id=${id}${s ? '&s='+s+'&e='+(e||'1') : ''}&ds_lang=${subLang}&sub_id=${subId}`;

  fetch(apiUrl)
    .then(r => r.json())
    .then(data => {
      if (data.error) throw new Error(data.error);
      play(data.url, data.subtitle);
    })
    .catch(err => {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('err').style.display = 'flex';
      document.getElementById('err-detail').textContent = err.message;
    });
}

function play(videoUrl, subtitleData) {
  const v = document.getElementById('v');
  const streamUrl = '/api?url=' + encodeURIComponent(videoUrl);

  if (subtitleData && Array.isArray(subtitleData)) {
    const seen = new Set();
    subtitleData.forEach((sub) => {
      if (!sub || !sub.url || seen.has(sub.url)) return;
      seen.add(sub.url);

      const lang = normalizeLang(sub.lang) || guessLangFromUrl(sub.url) || '';
      const label = buildLabel(sub.label, lang);

      const track = document.createElement('track');
      track.kind = 'subtitles';
      track.label = label;
      track.srclang = lang || 'und';
      track.src = sub.url;

      if (lang && lang === subLang) track.default = true;
      v.appendChild(track);
    });
  }

  if (Hls.isSupported()) {
    const hls = new Hls({ enableWorker: true });
    hls.loadSource(streamUrl);
    hls.attachMedia(v);
    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('player').style.display = 'block';
      v.play().catch(() => {});
    });
    v.onloadedmetadata = () => {
      let matched = false;
      for (let i = 0; i < v.textTracks.length; i++) {
        const tt = v.textTracks[i];
        if (normalizeLang(tt.language) === subLang && !matched) {
          tt.mode = 'showing'; matched = true;
        } else {
          tt.mode = 'disabled';
        }
      }
      if (!matched && v.textTracks.length > 0) v.textTracks[0].mode = 'showing';
    };
  } else {
    v.src = streamUrl;
    v.oncanplay = () => {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('player').style.display = 'block';
    };
  }
}
</script>
</body>
</html>
